name: truthful-attribution-gate
# Thin caller for the org-reusable truthful-attribution-gate (cinatra-ai/ci).
# WARN / advisory mode: findings are annotated and the check is ALWAYS green --
# it never fails a PR and is not a required check. The reusable workflow is
# SHA-pinned (both uses:@ and with.ref) to the immutable engine commit; the
# trailing version comment is approximate provenance, not an exact tag match.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read
  checks: read
  # actions:read is required: the engine resolves a reusable-workflow check-run
  # to its Actions run to verify the referenced workflow at the pinned SHA. With
  # an explicit permissions block, any omitted scope defaults to none, so a
  # called reusable workflow cannot exceed this grant -- keep this line.
  actions: read

jobs:
  truthful-attribution-gate:                 # caller job id MUST stay this exact string
    uses: cinatra-ai/ci/.github/workflows/truthful-attribution-gate.yml@8eede1022e835997d94974e4bd6205daf72131a2 # v0.1.0+8eede102
    with:
      mode: warn
      ref: 8eede1022e835997d94974e4bd6205daf72131a2
